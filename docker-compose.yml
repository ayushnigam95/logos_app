services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/data:/app/data
      - ./backend/browser_session:/app/browser_session
    environment:
      - CACHE_DB_PATH=/app/data/cache.db
      - BROWSER_SESSION_DIR=/app/browser_session

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
